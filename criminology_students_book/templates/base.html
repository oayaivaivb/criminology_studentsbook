{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="keywords" content="криминология, право, юридические науки, МВД, Кикотя"> 
    <meta name="description" content="Учебник КРИМИНОЛОГИЯ (общая часть) - Московский университет МВД России имени В.Я. Кикотя">
    
    <link rel="icon" href="{% static 'img/fav/favicon.ico' %}" type="image">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/fav/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/fav/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/fav/favicon-16x16.png' %}">
    
    <title>{% block title %}{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light">
    {% include "includes/header.html" %}
    
    <main>
        <div class="container py-5">
            <div class="row g-4">
                <!-- Сайдбар с оглавлением - ПЕРВЫЙ на мобильных и планшетах (до 992px) -->
                <div class="col-lg-4 col-xl-3 order-first order-lg-3">
                    <div class="position-sticky" style="top: 2rem;">
                        {% include "includes/chapters.html" %}
                    </div>
                </div>
                
                <!-- Основной контент - ВТОРОЙ на мобильных и планшетах -->
                <div class="col-lg-8 col-xl-9 order-last order-lg-1">
                    <div class="bg-white p-4 p-md-5 rounded-3 shadow-sm">
                        {% block content %}{% endblock %}
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    {% include "includes/footer.html" %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
